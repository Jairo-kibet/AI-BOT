{% comment %} <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GALGOTIA's Ai-Bot</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background-color: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  width: 400px;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  background-color: white;
  text-align: left;
  justify-content: left;
}

.top-section {
  background: url('/static/assets/Bg_popup.png') no-repeat center center;
  background-size: cover;
  padding: 40px 20px;
  position: relative;
}

.title {
  font-size: 24px;
  color: white;
  letter-spacing: 2px;
}

.bottom-section {
  padding: 30px 25px;
}

.main-heading {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 12px;
  color: #111827;
}

.sub-text {
  font-size: 16px;
  color: #4b5563;
  margin-bottom: 25px;
}

.button-group {
  display: flex;
  justify-content: left;
  gap: 20px;
}

.btn {
    padding: 7px 28px;
    border-radius: 9999px;
    font-size: 16px;
    font-weight: 400;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.10);
}

.btn-dark {
  background-color: #111827;
  color: white;
}

.btn-dark:hover {
  background-color: #1f2937;
}

.btn-light {
  background-color: #f3f4f6;
  color: #111827;
  border: 1px solid #d1d5db;
}

.btn-light:hover {
  background-color: #e5e7eb;
}

  </style>
</head>
<body>
  <div class="card">
    <div class="top-section">
      <h2 class="title">GALGOTIA’s <span class="ai-bot">Ai-Bot</span></h2>
    </div>
    <div class="bottom-section">
      <h1 class="main-heading">Your Smart Access</h1>
      <p class="sub-text">"You're just one step away from smarter assistance. Sign in now!"</p>
      <div class="button-group">
        <button class="btn btn-dark">Log in</button>
        <button class="btn btn-light">Sign up</button>
      </div>
    </div>
  </div>
</body>
</html> {% endcomment %}
