<!-- Popup Segment: Register Options -->
<div id="registerPopup" class="popup-overlay" style="display:none;">
  <div class="popup-content">
    <h2>Register As</h2>
    <div class="popup-options">
      <a href="/register/" class="popup-btn">Register as Normal User</a>
      <a href="/student-signup/" class="popup-btn">Register as Student</a>
    </div>
    <button class="popup-close" onclick="closePopup()">&times;</button>
  </div>
</div>

<!-- Popup Styles (can be moved to CSS file) -->
<style>
.popup-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.popup-content {
  background: #fff;
  padding: 2rem 2.5rem;
  border-radius: 10px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2);
  text-align: center;
  min-width: 300px;
}
.popup-options {
  margin: 1.5rem 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.popup-btn {
  background: #007bff;
  color: #fff;
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: 5px;
  text-decoration: none;
  font-size: 1rem;
  transition: background 0.2s;
}
.popup-btn:hover {
  background: #0056b3;
}
.popup-close {
  background: none;
  border: none;
  font-size: 2rem;
  color: #888;
  position: absolute;
  top: 10px;
  right: 20px;
  cursor: pointer;
}
</style>

<!-- Popup Script (can be moved to JS file) -->
<script>
function openPopup() {
  document.getElementById('registerPopup').style.display = 'flex';
}
function closePopup() {
  document.getElementById('registerPopup').style.display = 'none';
}
</script>
